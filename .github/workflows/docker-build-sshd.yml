# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
name: "SSHD • Docker Build"
on:
  schedule:
    - cron: "0 1 * * 6"
  workflow_dispatch:
  push:
    paths:
      - images/.trigger
      - images/sshd/**
      - .github/workflows/docker-build-sshd.yml
    branches:
      - main

jobs:
  sshd:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: sshd
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "3.15"
            }
          }
        ]
