# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE: build mysql via the reusable _service-build.yml
# (native amd64 + native arm64 + QEMU only for arm/v7 + merge + retry).
name: "mysql (native, prototype)"

on:
  workflow_dispatch:

jobs:
  mysql:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: mysql
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "9.3"
            }
          },
          {
            "build_tag": "8.4",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "8.4"
            }
          },
          {
            "build_tag": "8.0",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "8.0"
            }
          }
        ]
