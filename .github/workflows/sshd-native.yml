# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE: build sshd via the reusable _service-build.yml
# (native amd64 + native arm64 + QEMU only for arm/v7 + merge + retry).
name: "sshd (native, prototype)"

on:
  workflow_dispatch:

jobs:
  sshd:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: sshd
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "3.15"
            }
          }
        ]
