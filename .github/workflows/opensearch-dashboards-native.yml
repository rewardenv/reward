# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE: build opensearch-dashboards via the reusable _service-build.yml
# (native amd64 + native arm64 + QEMU only for arm/v7 + merge + retry).
name: "opensearch-dashboards (native, prototype)"

on:
  workflow_dispatch:

jobs:
  opensearch_dashboards:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: "opensearch-dashboards"
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "3.0.0"
            }
          },
          {
            "build_tag": "3.0",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "3.0.0"
            }
          },
          {
            "build_tag": "2.19",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "2.19.2"
            }
          },
          {
            "build_tag": "1.3",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "1.3.20"
            }
          }
        ]
