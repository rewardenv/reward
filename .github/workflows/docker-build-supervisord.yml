# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
name: "Supervisord • Docker Build"
on:
  schedule:
    - cron: "0 1 * * 6"
  workflow_dispatch:
  push:
    paths:
      - images/.trigger
      - images/supervisord/**
      - .github/workflows/docker-build-supervisord.yml
    branches:
      - main

jobs:
  supervisord:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: supervisord
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "alpine"
            }
          },
          {
            "build_tag": "0.7.3",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "alpine"
            }
          }
        ]
