# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE: build nginx via the reusable _service-build.yml
# (native amd64 + native arm64 + QEMU only for arm/v7 + merge + retry).
name: "nginx (native, prototype)"

on:
  workflow_dispatch:

jobs:
  nginx:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: nginx
      builds: |
        [
          {
            "build_tag": "1.28",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "1.28"
            }
          },
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "1.27"
            }
          },
          {
            "build_tag": "1.27",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "1.27"
            }
          },
          {
            "build_tag": "1.26",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "1.26"
            }
          }
        ]
