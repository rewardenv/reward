# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
name: "Redis • Docker Build"
on:
  schedule:
    - cron: "0 1 * * 6"
  workflow_dispatch:
  push:
    paths:
      - images/.trigger
      - images/redis/**
      - .github/workflows/docker-build-redis.yml
    branches:
      - main

jobs:
  redis:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: redis
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "8.0"
            }
          },
          {
            "build_tag": "8.0",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "8.0"
            }
          },
          {
            "build_tag": "7.4",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "7.4"
            }
          },
          {
            "build_tag": "7.2",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "7.2"
            }
          }
        ]
