# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE: build mailbox via the reusable _service-build.yml
# (native amd64 + native arm64 + QEMU only for arm/v7 + merge + retry).
name: "mailbox (native, prototype)"

on:
  workflow_dispatch:

jobs:
  mailbox:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: mailbox
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "v1.26"
            }
          },
          {
            "build_tag": "1.26",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "v1.26"
            }
          }
        ]
