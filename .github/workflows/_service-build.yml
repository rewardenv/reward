# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE reusable build for the simple (single-image) services.
#
# One template replaces the ~16 near-identical docker-build-<service>.yml files.
# A caller passes the service + a JSON list of builds; this workflow:
#   - expands each build x platform into per-arch jobs,
#   - runs amd64 on a native runner, arm64 on a NATIVE arm runner, and ONLY
#     arm/v7 under QEMU (there is no native 32-bit runner),
#   - renders the gomplate template (build `args` are exported as env),
#   - builds single-arch, pushes <tag>-<arch>, retries with backoff,
#   - merges the per-arch images into the final multi-arch manifest.
#
# fail-fast is off, so one arch/version flake does not cancel the rest.
#
# Each build entry: { "build_tag": "...", "platforms": "linux/amd64,...",
#                     "args": { "IMAGE_TAG": "...", ... } }
# `args` are passed BOTH as gomplate env (render time) and `--build-arg`.
on:
  workflow_call:
    inputs:
      service:
        description: "Directory under images/ (and default image name)"
        required: true
        type: string
      image:
        description: "Published image name (defaults to service)"
        required: false
        type: string
        default: ""
      tag_suffix:
        description: "Suffix appended to the published tag (e.g. -prod)"
        required: false
        type: string
        default: ""
      build_contexts:
        description: "Newline-separated name=path additional build contexts"
        required: false
        type: string
        default: ""
      builds:
        description: "JSON array of build entries"
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      builds: ${{ steps.expand.outputs.builds }}
      merges: ${{ steps.expand.outputs.merges }}
    steps:
      - name: Expand matrix
        id: expand
        env:
          BUILDS: ${{ inputs.builds }}
        run: |
          set -euo pipefail
          map='
            def arch: {"linux/amd64":"amd64","linux/arm64":"arm64","linux/arm/v7":"armv7"}[.];
            def runner: {"linux/amd64":"ubuntu-24.04","linux/arm64":"ubuntu-24.04-arm","linux/arm/v7":"ubuntu-24.04"}[.];
            def qemu: . == "linux/arm/v7";
          '
          builds=$(jq -c "${map} [ .[] as \$b | (\$b.platforms | split(\",\"))[] |
            { build_tag: \$b.build_tag, platform: ., arch: arch, runner: runner, qemu: qemu,
              args: (\$b.args // {}) } ]" <<<"${BUILDS}")
          merges=$(jq -c "${map} [ .[] | { build_tag, archs: (.platforms | split(\",\") | map(arch)) } ]" <<<"${BUILDS}")
          echo "builds={\"include\":${builds}}" >> "${GITHUB_OUTPUT}"
          echo "merges={\"include\":${merges}}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    name: "${{ inputs.service }}:${{ matrix.build_tag }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.builds) }}
    steps:
      - uses: actions/checkout@v7

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # QEMU only for the emulated arch (arm/v7). amd64/arm64 build natively.
      - name: Set up QEMU
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v4
        with:
          image: mirror.gcr.io/tonistiigi/binfmt:latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install gomplate
        uses: supplypike/setup-bin@v5
        with:
          # gomplate must match the RUNNER arch (arm64 only for the native arm runner).
          uri: https://github.com/hairyhenderson/gomplate/releases/latest/download/gomplate_linux-${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          name: gomplate
          version: latest

      - name: Render + build + push (${{ matrix.arch }})
        shell: bash
        env:
          SERVICE: ${{ inputs.service }}
          IMAGE: ${{ inputs.image != '' && inputs.image || inputs.service }}
          REPO: ${{ vars.DOCKER_REPO }}
          BUILD_TAG: ${{ matrix.build_tag }}
          TAG_SUFFIX: ${{ inputs.tag_suffix }}
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          ARGS: ${{ toJSON(matrix.args) }}
          BUILD_CONTEXTS: ${{ inputs.build_contexts }}
        run: |
          set -euo pipefail
          ref="${REPO}/${IMAGE}:${BUILD_TAG}${TAG_SUFFIX}-${ARCH}"
          cache="${REPO}/${IMAGE}:buildcache-${BUILD_TAG}${TAG_SUFFIX}-${ARCH}"

          # `args` are gomplate render-time values (the templates read them via
          # getenv and bake the result into the Dockerfile, sometimes derived —
          # e.g. varnish appends ~<distro> to VARNISH_VERSION). Export them for
          # the render; do NOT pass them as --build-arg, which would override
          # those gomplate-derived ARG defaults.
          while IFS='=' read -r k v; do export "${k}=${v}"; done \
            < <(jq -r 'to_entries[] | "\(.key)=\(.value)"' <<<"${ARGS}")

          # optional extra build contexts (e.g. node-prod scripts)
          bc=()
          while IFS= read -r line; do
            if [ -n "${line}" ]; then bc+=(--build-context "${line}"); fi
          done <<<"${BUILD_CONTEXTS}"

          gomplate -f "images/${SERVICE}/tpl.Dockerfile" -o "images/${SERVICE}/Dockerfile"

          # Retry the build up to 3 times (replaces the Node 20 retry action).
          n=0
          until docker buildx build \
              --platform "${PLATFORM}" \
              --file "images/${SERVICE}/Dockerfile" \
              --tag "${ref}" \
              "${bc[@]}" \
              --cache-from "type=registry,ref=${cache}" \
              --cache-to "type=registry,ref=${cache},mode=max" \
              --push \
              "images/${SERVICE}/context"; do
            n=$((n + 1))
            if [ "${n}" -ge 3 ]; then
              echo "build failed after ${n} attempts" >&2
              exit 1
            fi
            echo "build attempt ${n} failed; retrying in 60s..." >&2
            sleep 60
          done

  merge:
    needs: [prepare, build]
    name: "merge ${{ inputs.service }}:${{ matrix.build_tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.merges) }}
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifest
        env:
          IMAGE: ${{ inputs.image != '' && inputs.image || inputs.service }}
          REPO: ${{ vars.DOCKER_REPO }}
          BUILD_TAG: ${{ matrix.build_tag }}
          TAG_SUFFIX: ${{ inputs.tag_suffix }}
          ARCHS: ${{ join(matrix.archs, ' ') }}
        run: |
          set -euo pipefail
          target="${REPO}/${IMAGE}:${BUILD_TAG}${TAG_SUFFIX}"
          read -ra archs <<<"${ARCHS}"
          refs=()
          for a in "${archs[@]}"; do refs+=("${target}-${a}"); done
          docker buildx imagetools create -t "${target}" "${refs[@]}"

      # Remove the intermediate <tag>-<arch> tags now that the multi-arch
      # manifest <tag> references the per-arch images by digest. Docker Hub only;
      # best-effort (never fails the job).
      - name: Clean up per-arch tags
        shell: bash
        continue-on-error: true
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE: ${{ inputs.image != '' && inputs.image || inputs.service }}
          REPO: ${{ vars.DOCKER_REPO }}
          BUILD_TAG: ${{ matrix.build_tag }}
          TAG_SUFFIX: ${{ inputs.tag_suffix }}
          ARCHS: ${{ join(matrix.archs, ' ') }}
        run: |
          set -euo pipefail
          hub_repo="${REPO#docker.io/}/${IMAGE}"
          payload="$(jq -nc --arg u "${DOCKER_USERNAME}" --arg p "${DOCKER_PASSWORD}" '{username: $u, password: $p}')"
          token="$(curl -fsSL -H "Content-Type: application/json" -d "${payload}" \
            https://hub.docker.com/v2/users/login/ | jq -r '.token // empty' || true)"
          if [ -z "${token}" ]; then
            echo "::warning::could not authenticate to Docker Hub; skipping per-arch tag cleanup"
            exit 0
          fi
          read -ra archs <<<"${ARCHS}"
          for a in "${archs[@]}"; do
            tag="${BUILD_TAG}${TAG_SUFFIX}-${a}"
            if curl -fsSL -X DELETE -H "Authorization: JWT ${token}" \
              "https://hub.docker.com/v2/repositories/${hub_repo}/tags/${tag}/"; then
              echo "deleted ${hub_repo}:${tag}"
            else
              echo "::warning::could not delete ${hub_repo}:${tag}"
            fi
          done
