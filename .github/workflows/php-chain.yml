# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE: the magento2 PHP image chain on native runners, ordered with
# `needs:`. Replaces the 6-stage workflow-dispatch poll chain for this path.
#
# Each layer is a reusable _php-layer.yml call building native amd64 + native
# arm64 (no QEMU) + merge; `needs:` orders the layers so each pulls the previous
# layer's freshly merged image as its FROM:
#
#   cli -> fpm -> fpm-loaders -> php-fpm/base -> php-fpm/magento2
#
# The full build-out (cli-loaders, the other apps, -web and utils variants, and
# the rootless tree) follows the same shape, split across tier workflows chained
# with native `on: workflow_run` to stay under the 256-jobs-per-run limit.
name: "PHP Chain (prototype, native)"

on:
  workflow_dispatch:
    inputs:
      php_versions:
        description: "JSON array of {version, platforms}"
        required: false
        default: '[ { "version": "8.4", "platforms": "linux/amd64,linux/arm64" } ]'

jobs:
  cli:
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with:
      layer_dir: php/cli
      image: php
      php_versions: ${{ github.event.inputs.php_versions }}

  fpm:
    needs: cli
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with:
      layer_dir: php/fpm
      image: php
      tag_infix: "-fpm"
      php_versions: ${{ github.event.inputs.php_versions }}

  fpm-loaders:
    needs: fpm
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with:
      layer_dir: php/fpm-loaders
      image: php
      tag_infix: "-fpm-loaders"
      php_versions: ${{ github.event.inputs.php_versions }}

  base:
    needs: fpm-loaders
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with:
      layer_dir: php-fpm/base
      image: php-fpm
      build_args: '{ "PHP_VARIANT": "fpm-loaders" }'
      php_versions: ${{ github.event.inputs.php_versions }}

  magento2:
    needs: base
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with:
      layer_dir: php-fpm/magento2
      image: php-fpm
      tag_infix: "-magento2"
      php_versions: ${{ github.event.inputs.php_versions }}
