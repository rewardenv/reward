# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE: the PHP image chain on native runners, ordered with `needs:`.
#
# Replaces the 6-stage workflow-dispatch poll chain. Each layer is a reusable
# _php-layer.yml call building native amd64 + native arm64 (no QEMU) + merge;
# `needs:` orders the layers so each pulls the previous layer's merged image as
# its FROM. Start small (cli -> fpm, one version) to prove ordering + the cli
# fix, then scale to the full chain and all versions/apps.
name: "PHP Chain (prototype, native)"

on:
  workflow_dispatch:
    inputs:
      php_versions:
        description: "JSON array of {version, platforms}"
        required: false
        default: '[ { "version": "8.4", "platforms": "linux/amd64,linux/arm64" } ]'

jobs:
  cli:
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with:
      layer_dir: php/cli
      image: php
      php_versions: ${{ github.event.inputs.php_versions }}

  fpm:
    needs: cli
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with:
      layer_dir: php/fpm
      image: php
      tag_infix: "-fpm"
      php_versions: ${{ github.event.inputs.php_versions }}
