# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
# PROTOTYPE: the PHP image chain on native runners, ordered with `needs:`.
# Replaces the 6-stage workflow-dispatch poll chain.
#
# Each layer is a reusable _php-layer.yml call building native amd64 + native
# arm64 (no QEMU) + merge; `needs:` orders the layers so each pulls the previous
# layer's freshly merged image as its FROM:
#
#   cli -> fpm -> fpm-loaders -> base -> {magento1,magento2,shopware,wordpress}
#                                         magento2  -> magento2-web   (etc.)
#
# Deferred to the productionization phase (need per-layer specifics):
#   - cli-loaders (arch-sensitive SourceGuardian), utils (blackfire/spx/xdebug),
#     where xdebug2 only builds on PHP <= 7.4 (per-layer version subset);
#   - the rootless tree (same shape, -rootless);
#   - all PHP versions, and splitting into tier workflows chained with native
#     `on: workflow_run` to stay under the 256-jobs-per-run limit.
name: "PHP Chain (prototype, native)"

on:
  workflow_dispatch:
    inputs:
      php_versions:
        description: "JSON array of {version, platforms}"
        required: false
        default: '[ { "version": "8.4", "platforms": "linux/amd64,linux/arm64" } ]'

jobs:
  cli:
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php/cli, image: php, php_versions: "${{ github.event.inputs.php_versions }}" }

  fpm:
    needs: cli
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php/fpm, image: php, tag_infix: "-fpm", php_versions: "${{ github.event.inputs.php_versions }}" }

  fpm-loaders:
    needs: fpm
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php/fpm-loaders, image: php, tag_infix: "-fpm-loaders", php_versions: "${{ github.event.inputs.php_versions }}" }

  base:
    needs: fpm-loaders
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with:
      layer_dir: php-fpm/base
      image: php-fpm
      build_args: '{ "PHP_VARIANT": "fpm-loaders" }'
      php_versions: "${{ github.event.inputs.php_versions }}"

  magento1:
    needs: base
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php-fpm/magento1, image: php-fpm, tag_infix: "-magento1", php_versions: "${{ github.event.inputs.php_versions }}" }

  magento2:
    needs: base
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php-fpm/magento2, image: php-fpm, tag_infix: "-magento2", php_versions: "${{ github.event.inputs.php_versions }}" }

  shopware:
    needs: base
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php-fpm/shopware, image: php-fpm, tag_infix: "-shopware", php_versions: "${{ github.event.inputs.php_versions }}" }

  wordpress:
    needs: base
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php-fpm/wordpress, image: php-fpm, tag_infix: "-wordpress", php_versions: "${{ github.event.inputs.php_versions }}" }

  magento2-web:
    needs: magento2
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php-fpm/magento2-web, image: php-fpm, tag_infix: "-magento2-web", php_versions: "${{ github.event.inputs.php_versions }}" }

  shopware-web:
    needs: shopware
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php-fpm/shopware-web, image: php-fpm, tag_infix: "-shopware-web", php_versions: "${{ github.event.inputs.php_versions }}" }

  wordpress-web:
    needs: wordpress
    uses: ./.github/workflows/_php-layer.yml
    secrets: inherit
    with: { layer_dir: php-fpm/wordpress-web, image: php-fpm, tag_infix: "-wordpress-web", php_versions: "${{ github.event.inputs.php_versions }}" }
