# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
name: "RabbitMQ • Docker Build"
on:
  schedule:
    - cron: "0 1 * * 6"
  workflow_dispatch:
  push:
    paths:
      - images/.trigger
      - images/rabbitmq/**
      - .github/workflows/docker-build-rabbitmq.yml
    branches:
      - main

jobs:
  rabbitmq:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: rabbitmq
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "4.2"
            }
          },
          {
            "build_tag": "4.2",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "4.2"
            }
          },
          {
            "build_tag": "4.1",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "4.1"
            }
          },
          {
            "build_tag": "4.0",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "4.0"
            }
          },
          {
            "build_tag": "3.13",
            "platforms": "linux/amd64,linux/arm/v7,linux/arm64",
            "args": {
              "IMAGE_TAG": "3.13"
            }
          }
        ]
