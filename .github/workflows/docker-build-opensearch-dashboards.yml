# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
---
name: "Opensearch Dashboards • Docker Build"
on:
  schedule:
    - cron: "0 1 * * 6"
  workflow_dispatch:
  push:
    paths:
      - images/.trigger
      - images/opensearch-dashboards/**
      - .github/workflows/docker-build-opensearch-dashboards.yml
    branches:
      - main

jobs:
  opensearch_dashboards:
    uses: ./.github/workflows/_service-build.yml
    secrets: inherit
    with:
      service: "opensearch-dashboards"
      builds: |
        [
          {
            "build_tag": "latest",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "3.0.0"
            }
          },
          {
            "build_tag": "3.0",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "3.0.0"
            }
          },
          {
            "build_tag": "2.19",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "2.19.2"
            }
          },
          {
            "build_tag": "1.3",
            "platforms": "linux/amd64,linux/arm64",
            "args": {
              "IMAGE_TAG": "1.3.20"
            }
          }
        ]
